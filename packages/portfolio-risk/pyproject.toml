[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "portfolio-risk"
version = "0.17.3"
description = "Shifted-lognormal LMM portfolio risk engine for bank balance sheets"
requires-python = ">=3.10"
dependencies = [
    "numpy>=1.26",
    "polars>=1.0",
    "numba>=0.59",
    "scipy>=1.11",
]

[project.optional-dependencies]
dev = ["pytest>=8"]

[project.scripts]
portfolio-risk = "portfolio_risk.__main__:main"

[tool.setuptools.packages.find]
where = ["src"]
