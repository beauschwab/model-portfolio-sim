[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "mbs-risk"
version = "0.15.0"
description = "Shifted-lognormal LMM OAS/risk/stress engine for agency MBS portfolios"
requires-python = ">=3.10"
dependencies = [
    "numpy>=1.26",
    "polars>=1.0",
    "numba>=0.59",
    "scipy>=1.11",
]

[project.optional-dependencies]
dev = ["pytest>=8"]

[project.scripts]
mbs-risk = "mbs_risk.__main__:main"

[tool.setuptools.packages.find]
where = ["src"]
